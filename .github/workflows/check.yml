name: Check
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.7
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -fSL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -o godot.zip
          unzip godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Check scripts
        run: ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --quit
