name: Export Web
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GODOT_VERSION: 4.7
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -fSL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -o godot.zip
          unzip godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -fSL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -o templates.tpz
          unzip -q templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/web_nothreads_*.zip ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Web
        run: |
          mkdir -p build/web
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --export-release "Web" ./build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
